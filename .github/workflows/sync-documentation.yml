name: 📚 Documentation Sync
# Automatically sync documentation from documentation-master to other branches

on:
  push:
    branches: [documentation-master]
    paths: 
      - '**.md'
      - '.github/**/*.md'
      - 'docs/**'
      - '**.txt'
      - 'archive/**/*.md'

  workflow_dispatch:
    inputs:
      target_branches:
        description: 'Comma-separated list of branches to sync to (default: main,staging)'
        required: false
        default: 'main,staging'
        type: string

jobs:
  sync-documentation:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/documentation-master'
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🔧 Configure Git
      run: |
        git config user.name "Documentation Sync Bot"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: 📊 Detect changes
      id: changes
      run: |
        # Get list of changed files
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E '\.(md|txt|rst)$' || true)
        echo "Changed documentation files:"
        echo "$CHANGED_FILES"
        echo "changed_files<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        # Count changes
        CHANGE_COUNT=$(echo "$CHANGED_FILES" | grep -v '^$' | wc -l)
        echo "change_count=$CHANGE_COUNT" >> $GITHUB_OUTPUT

    - name: 🎯 Determine target branches
      id: target_branches
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TARGET_BRANCHES="${{ inputs.target_branches }}"
        else
          TARGET_BRANCHES="main,staging"
        fi
        echo "target_branches=$TARGET_BRANCHES" >> $GITHUB_OUTPUT
        echo "Will sync to branches: $TARGET_BRANCHES"

    - name: 🔄 Sync to target branches
      if: steps.changes.outputs.change_count > 0
      run: |
        TARGET_BRANCHES="${{ steps.target_branches.outputs.target_branches }}"
        
        # Convert comma-separated string to array
        IFS=',' read -ra BRANCHES <<< "$TARGET_BRANCHES"
        
        for branch in "${BRANCHES[@]}"; do
          branch=$(echo "$branch" | xargs)  # Trim whitespace
          echo "🔄 Syncing documentation to branch: $branch"
          
          # Check if branch exists on remote
          if git ls-remote --heads origin "$branch" | grep -q "$branch"; then
            # Checkout the target branch
            git checkout "$branch"
            git pull origin "$branch" || {
              echo "⚠️ Could not pull $branch, skipping..."
              continue
            }
            
            # Merge documentation-master
            if git merge origin/documentation-master --no-ff -m "docs: auto-sync from documentation-master

Synced documentation files:
${{ steps.changes.outputs.changed_files }}

Auto-generated by GitHub Actions
Commit: ${{ github.sha }}"; then
              echo "✅ Successfully merged documentation to $branch"
              
              # Push the changes
              if git push origin "$branch"; then
                echo "✅ Successfully pushed documentation sync to $branch"
              else
                echo "❌ Failed to push to $branch"
              fi
            else
              echo "❌ Merge conflict in $branch - manual intervention required"
              git merge --abort || true
            fi
          else
            echo "⚠️ Branch $branch does not exist on remote, skipping..."
          fi
        done

    - name: 📋 Create sync summary
      if: steps.changes.outputs.change_count > 0
      run: |
        echo "## 📚 Documentation Sync Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Triggered by**: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Source branch**: \`documentation-master\`" >> $GITHUB_STEP_SUMMARY
        echo "**Target branches**: \`${{ steps.target_branches.outputs.target_branches }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📄 Changed Files (${{ steps.changes.outputs.change_count }})" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.changes.outputs.changed_files }}" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔄 Sync Status" >> $GITHUB_STEP_SUMMARY
        
        TARGET_BRANCHES="${{ steps.target_branches.outputs.target_branches }}"
        IFS=',' read -ra BRANCHES <<< "$TARGET_BRANCHES"
        
        for branch in "${BRANCHES[@]}"; do
          branch=$(echo "$branch" | xargs)
          if git ls-remote --heads origin "$branch" | grep -q "$branch"; then
            echo "- ✅ \`$branch\`: Synced successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ \`$branch\`: Branch not found" >> $GITHUB_STEP_SUMMARY
          fi
        done

    - name: 🚨 Handle no changes
      if: steps.changes.outputs.change_count == 0
      run: |
        echo "ℹ️ No documentation files were changed in this push"
        echo "## 📚 Documentation Sync" >> $GITHUB_STEP_SUMMARY
        echo "No documentation changes detected - sync skipped" >> $GITHUB_STEP_SUMMARY

  validate-documentation:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/documentation-master'
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🔍 Validate documentation structure
      run: |
        echo "🔍 Validating documentation structure..."
        
        # Check for required files
        REQUIRED_FILES=(
          "README.md"
          "DOCUMENTATION_HUB.md"
          "README-DOCS.md"
          "PROJECT_MANAGER_AUDIT_REPORT.md"
          "CONTRIBUTING.md"
        )
        
        MISSING_FILES=()
        for file in "${REQUIRED_FILES[@]}"; do
          if [ ! -f "$file" ]; then
            MISSING_FILES+=("$file")
          fi
        done
        
        if [ ${#MISSING_FILES[@]} -gt 0 ]; then
          echo "❌ Missing required documentation files:"
          printf '%s\n' "${MISSING_FILES[@]}"
          exit 1
        else
          echo "✅ All required documentation files present"
        fi

    - name: 🔍 Check for legacy references
      run: |
        echo "🔍 Checking for legacy 'firmsync-only' references..."
        
        # Search for problematic legacy terms
        LEGACY_TERMS=("firmsync-only" "only legal" "just legal" "legal platform only")
        FOUND_ISSUES=()
        
        for term in "${LEGACY_TERMS[@]}"; do
          if grep -r -i "$term" --include="*.md" .; then
            FOUND_ISSUES+=("$term")
          fi
        done
        
        if [ ${#FOUND_ISSUES[@]} -gt 0 ]; then
          echo "⚠️ Found legacy references that should be updated:"
          printf '%s\n' "${FOUND_ISSUES[@]}"
          # Don't fail the build, just warn
        else
          echo "✅ No legacy single-vertical references found"
        fi

    - name: 📊 Generate documentation report
      run: |
        echo "## 📚 Documentation Validation Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Count documentation files
        MD_COUNT=$(find . -name "*.md" | wc -l)
        echo "**Total markdown files**: $MD_COUNT" >> $GITHUB_STEP_SUMMARY
        
        # Check file sizes
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📄 Key Documentation Files" >> $GITHUB_STEP_SUMMARY
        echo "| File | Size | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|------|--------|" >> $GITHUB_STEP_SUMMARY
        
        KEY_FILES=("README.md" "DOCUMENTATION_HUB.md" "PROJECT_MANAGER_AUDIT_REPORT.md" "CONTRIBUTING.md")
        for file in "${KEY_FILES[@]}"; do
          if [ -f "$file" ]; then
            SIZE=$(wc -c < "$file" | numfmt --to=iec)
            echo "| \`$file\` | $SIZE | ✅ Present |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| \`$file\` | - | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
          fi
        done
